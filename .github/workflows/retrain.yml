name: weekly-retrain

# Heavy weekly retrain (~5.5 GiB peak) runs here on GitHub's free 16 GB runner instead of
# the 4 GiB Azure job, then pushes the promoted model to HuggingFace. The hourly serve job
# on Azure pulls the new model from HF at load time — no Azure redeploy needed.

on:
  schedule:
    - cron: "0 3 * * 0"        # Sundays 03:00 UTC (matches the old Azure retrain schedule)
  workflow_dispatch: {}         # allow manual runs from the Actions tab

concurrency:
  group: weekly-retrain
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 340       # bronze sync (~1.5 h) + CPU TCN training (~2 h) needs headroom
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps (CPU torch + job requirements)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.12.1"
          pip install -r requirements-job.txt

      - name: Retrain both horizons and push to HuggingFace
        env:
          GRIDSIGHT_HF_TOKEN: ${{ secrets.GRIDSIGHT_HF_TOKEN }}
          GRIDSIGHT_BRONZE_HF_REPO: Masonhoang1107/gridsight-bronze
          # 24 months of history for training (was 36 — the extra year mostly cost sync time,
          # ~2.3 h alone, and blew the runner's wall-clock limit; 2 yr still covers 2 full seasons)
          GRIDSIGHT_SYNC_MONTHS: "24"
          # NESO stays full-archive (NESO_LEAN unset) — the per-file incremental build keeps it light
          # skip the flaky Met "overwrite last day" HDF5 pass; the gap-fill before it is enough
          GRIDSIGHT_MET_OVERWRITE: "0"
          # push refreshed bronze + derived silver/gold back to HF, and always ship the new model
          GRIDSIGHT_PUSH_BRONZE: "1"
          GRIDSIGHT_PUSH_DERIVED: "1"
          GRIDSIGHT_FORCE_PROMOTE: "1"
          # rolling split defaults live in modeling/config.py; override the windows here if wanted:
          # GRIDSIGHT_VAL_WEEKS: "8"
          # GRIDSIGHT_TEST_WEEKS: "8"
          KMP_DUPLICATE_LIB_OK: "TRUE"
          OMP_NUM_THREADS: "2"
        run: python pipeline.py retrain
