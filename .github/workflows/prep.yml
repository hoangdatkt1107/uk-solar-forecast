name: weekly-prep

# Stage 1 of the split weekly retrain (Saturday). The heavy ~2 h bronze sync + gold rebuild
# lives here and pushes fresh bronze/silver/gold to HF. The Sunday `weekly-train` job then just
# pulls gold and trains — so neither job hits GitHub's hard 6 h per-job cap, and we can train on
# the full history at full epochs/folds instead of trimming months to fit one combined run.

on:
  schedule:
    - cron: "0 3 * * 6"        # Saturdays 03:00 UTC (train runs Sundays 03:00)
  workflow_dispatch: {}

concurrency:
  group: weekly-prep
  cancel-in-progress: false

jobs:
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps (CPU torch + job requirements)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.12.1"
          pip install -r requirements-job.txt

      - name: Refresh bronze + build & push gold (no training)
        env:
          GRIDSIGHT_HF_TOKEN: ${{ secrets.GRIDSIGHT_HF_TOKEN }}
          GRIDSIGHT_BRONZE_HF_REPO: Masonhoang1107/gridsight-bronze
          GRIDSIGHT_SYNC_MONTHS: "36"        # full 3-year history (the train job trains on this)
          GRIDSIGHT_MET_OVERWRITE: "0"
          GRIDSIGHT_PUSH_BRONZE: "1"
          GRIDSIGHT_PUSH_DERIVED: "1"        # push silver + gold so the train job can pull gold
          KMP_DUPLICATE_LIB_OK: "TRUE"
          OMP_NUM_THREADS: "2"
        run: python pipeline.py prep
